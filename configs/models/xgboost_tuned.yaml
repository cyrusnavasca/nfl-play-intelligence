# XGBoost with Optuna (TPE / Bayesian) hyperparameter search.
# Run: python3 -m src.pipelines.run --config configs/models/xgboost_tuned.yaml --tune
#
# The `tune` block controls the study; each model's `search` block defines the
# parameter distributions. Fixed params outside `search` are held constant.
# Search runs on a stratified subsample with fewer folds for speed; the winning
# params are then evaluated with full 5-fold CV.

name: xgboost_tuned
description: XGBoost tuned via Optuna Bayesian (TPE) search.

seed: 42
n_folds: 5
persist_best: false

tune:
  n_trials: 60
  cv_folds: 4              # more folds for a more reliable search estimate
  subsample_rows: 120000   # larger subsample so scores transfer to full CV

models:
  xgboost:
    # Fixed (not searched).
    eval_metric: logloss
    random_state: 42
    verbosity: 0
    # Searched — Optuna distributions. n_estimators is now searched jointly with
    # learning_rate so low-LR configs get enough trees to converge.
    search:
      n_estimators:     {type: int,   low: 300,  high: 1200, step: 100}
      max_depth:        {type: int,   low: 3,    high: 10}
      learning_rate:    {type: float, low: 0.01, high: 0.3, log: true}
      subsample:        {type: float, low: 0.6,  high: 1.0}
      colsample_bytree: {type: float, low: 0.6,  high: 1.0}
      min_child_weight: {type: int,   low: 1,    high: 12}
      reg_lambda:       {type: float, low: 0.1,  high: 10.0, log: true}
      reg_alpha:        {type: float, low: 0.001, high: 5.0, log: true}
      gamma:            {type: float, low: 0.0,  high: 5.0}
