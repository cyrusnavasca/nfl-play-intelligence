# XGBoost experiment for play-type.
# Run: python3 -m src.pipelines.run --config configs/models/xgboost.yaml
#
# Tune: edit values under models.xgboost (passed to xgboost.XGBClassifier).
# Common knobs:
#   n_estimators, max_depth, learning_rate, subsample, colsample_bytree,
#   min_child_weight, reg_lambda, reg_alpha, scale_pos_weight.

name: xgboost
description: XGBoost gradient-boosted trees on play-type.

seed: 42
n_folds: 5
persist_best: false

models:
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 1
    reg_lambda: 1.0
    eval_metric: logloss
    random_state: 42
    verbosity: 0
