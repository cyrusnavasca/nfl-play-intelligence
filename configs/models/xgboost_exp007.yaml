# exp_007 tuned XGBoost — CONCRETE resolved params (Optuna TPE winners).
# Concrete (no `search:` block) so re-persisting exp_007 writes real
# hyperparameters into config.yaml instead of the tuning-profile placeholders.
# Run: python3 -m src.pipelines.run --config configs/models/xgboost_exp007.yaml \
#        --experiment exp_007 --skip-training --persist-best

name: xgboost_tuned
description: XGBoost tuned via Optuna Bayesian (TPE) search.

seed: 42
n_folds: 5
persist_best: false

models:
  xgboost:
    eval_metric: logloss
    random_state: 42
    verbosity: 0
    n_estimators: 800
    max_depth: 9
    learning_rate: 0.011624228953947071
    subsample: 0.7094987150323492
    colsample_bytree: 0.9886119673694892
    min_child_weight: 12
    reg_lambda: 0.9327893590138686
    reg_alpha: 0.05277458621594773
    gamma: 2.4773180191777024
