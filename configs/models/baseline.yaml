# Baseline experiment — DummyClassifier sanity check for play-type.
# Run: python3 -m src.pipelines.run --config configs/models/baseline.yaml
#
# Tune: edit values under models.baseline. DummyClassifier strategy options:
#   prior | most_frequent | stratified | uniform | constant

name: baseline
description: Prior-probability dummy classifier (sanity-check floor for roc_auc).

seed: 42
n_folds: 5
persist_best: false

models:
  baseline:
    strategy: prior
