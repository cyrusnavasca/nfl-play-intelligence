name: default
description: Production-like XGB settings; compare baseline, random forest, and xgboost on play type

seed: 42
n_folds: 5
persist_best: false

models:
  baseline:
    strategy: prior
  random_forest:
    n_estimators: 300
    min_samples_leaf: 5
    class_weight: balanced
    random_state: 42
    n_jobs: -1
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: logloss
    random_state: 42
    verbosity: 0
